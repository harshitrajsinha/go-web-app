name: CI pipeline with DevSecOps implementation

on:
  push:
    branches:
      - main
    paths-exlude:
      - '**/*.md'
  
permissions:
  contents: read

jobs:

  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      
      - name: Secrets scan
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_NOTIFY_USER_LIST: '@harshitrajsinha'
      
      - name: Setup Go version '1.22'
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.22'

      - name: Linting
        uses: golangci/golangci-lint-action@v9.2.1

  vulnerability-scan:
    needs: [security-scan]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
        
      - name: Setup Go version '1.22'
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.22'
      
      - name: Vulnerability scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.0
          govulncheck ./...
        
  unit-test:
    needs: [security-scan]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        
      - name: Setup Go version '1.22'
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.22'
      
      - name: Build app
        run: go build -o go-web-app main.go

      - name: Run go test
        run: go test ./...

  image-build-release:
    needs: [security-scan, unit-test]
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: harshitrajsinha/go-web-app
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        
      - name: Setup Go version '1.22'
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.22'
      
      - name: Build app
        run: go build -o go-web-app main.go
      
      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker images
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG}}
