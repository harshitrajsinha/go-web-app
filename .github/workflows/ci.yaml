name: CI pipeline with DevSecOps implementation

on:
  push:
    branches:
      - main
    paths-exlude:
      - '**/*.md'
  
permissions:
  contents: read

jobs:

  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      
      - name: Secrets scan
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_NOTIFY_USER_LIST: '@harshitrajsinha'

  vulnerability-scan:
    needs: [security-scan]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
        
      - name: Setup Go version '1.22'
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.22'
      
      - name: Vulnerability scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.0
          govulncheck ./...

  linting:
    needs: [security-scan]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
        
      - name: Setup Go version '1.22'
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.22'

      - name: Linting
        uses: golangci/golangci-lint-action@v9.2.1

  sonarqube:
    needs: [security-scan]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
        
      - name: SonarQube Scan
        if: github.ref == 'refs/heads/main'
        uses: SonarSource/sonarqube-scan-action@v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          with:
            args: >
              "-Dsonar.projectName=go-web-app"
              -Dsonar.projectKey=go-web-app
              -Dsonar.sources=/
              -Dsonar.tests=tests/
  
  unit-test:
    needs: [security-scan]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        
      - name: Setup Go version '1.22'
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.22'
      
      - name: Build app
        uses: go build -o main ./main.go

      - name: Run go test
        run: go test ./...

  # image-build-release:

