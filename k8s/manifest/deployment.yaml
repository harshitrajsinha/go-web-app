apiVersion: apps/v1
kind: Deployment
metadata:
  name: goweb-deploy
  namespace: goweb
  labels:
    app: goweb-deploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: gowebapp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gowebapp
    spec:
      containers:
      - name: go-container
        image: harshitrajsinha/go-web-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080